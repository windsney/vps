services:
  web_canetex:
    image: windsney/canetex:latest
    container_name: canetex_app
    ports:
      - "8000:8000"  # Acessível via http://IP-DA-VPS:8000
    environment:
      # Configurações para o Django conectar no MariaDB Mestre
      - DB_NAME=canetex_db
      - DB_USER=root
      - DB_PASSWORD=indio2272
      - DB_HOST=db_mestre
      - DB_PORT=3306
      - PYTHONUNBUFFERED=1
    networks:
      - rede_compartilhada
    deploy:
      resources:
        limits:
          memory: 256M # Garante que o Canetex não consuma toda a RAM da VPS
    restart: always

networks:
  rede_compartilhada:
    external: true
