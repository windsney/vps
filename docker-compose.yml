services:
  web_fernanda:
    image: windsney/fernanda:latest
    container_name: fernanda_app
    ports:
      - "8003:8000"
    environment:
      # Variáveis que o Django vai ler no seu settings.py
      - DB_NAME=fernanda_db
      - DB_USER=root
      - DB_PASSWORD=indio2272
      - DB_HOST=db_mestre
      - DB_PORT=3306
      - PYTHONUNBUFFERED=1
    networks:
      - rede_compartilhada
    deploy:
      resources:
        limits:
          memory: 256M # Limite de RAM para não travar a VPS
    restart: always

networks:
  rede_compartilhada:
    external: true
